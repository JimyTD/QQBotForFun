services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qqbot
      POSTGRES_PASSWORD: qqbot_pass
      POSTGRES_DB: qqbot
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qqbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  napcat:
    image: mlikiowa/napcat-docker:latest
    restart: unless-stopped
    environment:
      - WEBUI_PORT=6099
    ports:
      - "6099:6099"       # Web UI（建议仅内网访问）
    volumes:
      - napcat_data:/app/napcat

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      napcat:
        condition: service_started
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+asyncpg://qqbot:qqbot_pass@postgres:5432/qqbot
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "8080:8080"

volumes:
  pg_data:
    # ⚠️ 固定卷名，确保换目录部署时数据不丢失
    # 首次部署需手动创建：docker volume create qqbot_pg_data
    external: true
    name: qqbot_pg_data
  redis_data:
    external: true
    name: qqbot_redis_data
  napcat_data:
    external: true
    name: qqbot_napcat_data
