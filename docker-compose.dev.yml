services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    restart: unless-stopped
    environment:
      - WEBUI_PORT=6099
    ports:
      - "6099:6099"
    volumes:
      - ./napcat/data:/app/napcat
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
