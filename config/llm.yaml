providers:
  zhipu:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: ${ZHIPU_API_KEY}
    timeout_seconds: 60

  longcat:
    base_url: https://api.longcat.chat/openai
    api_key: ${LONGCAT_API_KEY}
    timeout_seconds: 30

  # 可选供应商（需要时取消注释并填 .env 对应 KEY）
  # openrouter:
  #   base_url: https://openrouter.ai/api/v1
  #   api_key: ${OPENROUTER_API_KEY}
  # deepseek:
  #   base_url: https://api.deepseek.com/v1
  #   api_key: ${DEEPSEEK_API_KEY}
  #
  # 曾用 siliconflow，2026-04 免费额度已耗尽，移除。
  # 如需重用，取消注释并补 .env: SILICONFLOW_API_KEY
  # siliconflow:
  #   base_url: https://api.siliconflow.cn/v1
  #   api_key: ${SILICONFLOW_API_KEY}

defaults:
  retries: 3
  backoff_base_seconds: 1.0
  backoff_max_seconds: 10.0

# 模型说明（2026-05 实测，详见 scripts/benchmark_llm.py）：
# - glm-4-flash    ：永久免费，额度宽松，延迟波动大（1.7s~5s），已被 250414 取代
# - glm-4-flash-250414：新版 flash，免费，~1.1s，稳定性极好（波动78ms），出题用
# - glm-4-flashx   ：flash 增强版，~600ms，稳定，判定/宣告用
# - glm-4.5-flash  ：实测限速严重、延迟 13s+，不推荐
# - glm-4.7-flash  ：个人号 1302 速率限制，不可用
#
# 差异化策略：
# - 大 token 出题场景走 glm-4-flash-250414（快且稳定）
# - 小 token 高质量场景（判定/宣告）走 glm-4-flashx（推理更准）

scenes:
  default:
    provider: zhipu
    model: glm-4-flashx
    temperature: 0.7
    max_tokens: 1024

  turtle_soup_host:
    # 出题 token 消耗大，走 glm-4-flash-250414（比老 flash 快 4 倍且更稳定）
    provider: zhipu
    model: glm-4-flash-250414
    temperature: 0.9
    max_tokens: 2048
    json_mode_default: true

  turtle_soup_judge:
    provider: zhipu
    model: glm-4-flashx
    temperature: 0.1
    max_tokens: 256
    json_mode_default: true
    timeout_seconds: 30

  turtle_soup_claim:
    provider: zhipu
    model: glm-4-flashx
    temperature: 0.2
    max_tokens: 512
    json_mode_default: true
    timeout_seconds: 45

  trivia_host:
    # 趣味问答出题，走 glm-4-flash-250414（快且稳定）
    provider: zhipu
    model: glm-4-flash-250414
    temperature: 0.9
    max_tokens: 1024
    json_mode_default: true
    timeout_seconds: 30

  ask_ai:
    # 查资料：需要广博知识面，LongCat-Flash-Lite 比智谱 flash 系列知识更准确
    provider: longcat
    model: LongCat-Flash-Lite
    temperature: 0.7
    max_tokens: 1024
    timeout_seconds: 30

  web_search:
    # 联网搜索总结：低温度，忠于搜索结果不编造
    provider: zhipu
    model: glm-4-flashx
    temperature: 0.3
    max_tokens: 512
    timeout_seconds: 30
