providers:
  zhipu:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: ${ZHIPU_API_KEY}
    timeout_seconds: 60

  # 可选供应商（需要时取消注释并填 .env 对应 KEY）
  # openrouter:
  #   base_url: https://openrouter.ai/api/v1
  #   api_key: ${OPENROUTER_API_KEY}
  # deepseek:
  #   base_url: https://api.deepseek.com/v1
  #   api_key: ${DEEPSEEK_API_KEY}
  #
  # 曾用 siliconflow，2026-04 免费额度已耗尽，移除。
  # 如需重用，取消注释并补 .env: SILICONFLOW_API_KEY
  # siliconflow:
  #   base_url: https://api.siliconflow.cn/v1
  #   api_key: ${SILICONFLOW_API_KEY}

defaults:
  retries: 3
  backoff_base_seconds: 1.0
  backoff_max_seconds: 10.0

# 模型说明（2026-04 实测，详见 scripts/benchmark_llm.py）：
# - glm-4-flash    ：永久免费，额度宽松，~880ms，稳定（大 token 场景用它）
# - glm-4-flashx   ：flash 增强版，~840ms，稳定，但大 token 请求偶限速 1302/1305
# - glm-4-air      ：付费但便宜，~758ms 最快，强一些
# - glm-4.5-flash  ：实测限速严重、延迟 13s+，不推荐
# - glm-4.7-flash  ：个人号 1302 速率限制，不可用
#
# 差异化策略：
# - 大 token 场景（出题 2048 tokens）走 glm-4-flash（免费额度大）
# - 小 token 高质量场景（判定/宣告）走 glm-4-flashx（推理更准）

scenes:
  default:
    provider: zhipu
    model: glm-4-flashx
    temperature: 0.7
    max_tokens: 1024

  turtle_soup_host:
    # 出题 token 消耗大，走 glm-4-flash 避开 flashx 的限流
    provider: zhipu
    model: glm-4-flash
    temperature: 0.9
    max_tokens: 2048
    json_mode_default: true

  turtle_soup_judge:
    provider: zhipu
    model: glm-4-flashx
    temperature: 0.1
    max_tokens: 256
    json_mode_default: true
    timeout_seconds: 30

  turtle_soup_claim:
    provider: zhipu
    model: glm-4-flashx
    temperature: 0.2
    max_tokens: 512
    json_mode_default: true
    timeout_seconds: 45
