providers:
  zhipu:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: ${ZHIPU_API_KEY}
    timeout_seconds: 60

  siliconflow:
    base_url: https://api.siliconflow.cn/v1
    api_key: ${SILICONFLOW_API_KEY}
    timeout_seconds: 60

  # 可选供应商（需要时取消注释并填 .env 对应 KEY）
  # openrouter:
  #   base_url: https://openrouter.ai/api/v1
  #   api_key: ${OPENROUTER_API_KEY}
  # deepseek:
  #   base_url: https://api.deepseek.com/v1
  #   api_key: ${DEEPSEEK_API_KEY}

defaults:
  retries: 3
  backoff_base_seconds: 1.0
  backoff_max_seconds: 10.0

scenes:
  default:
    provider: zhipu
    model: glm-4-flash
    temperature: 0.7
    max_tokens: 1024

  turtle_soup_host:
    provider: siliconflow
    model: Qwen/Qwen2.5-72B-Instruct
    temperature: 0.9
    max_tokens: 2048
    json_mode_default: true

  turtle_soup_judge:
    provider: zhipu
    model: glm-4-flash
    temperature: 0.1
    max_tokens: 256
    json_mode_default: true
    timeout_seconds: 30

  turtle_soup_claim:
    provider: zhipu
    model: glm-4-flash
    temperature: 0.2
    max_tokens: 512
    json_mode_default: true
    timeout_seconds: 45
