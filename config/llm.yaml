providers:
  zhipu:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: ${ZHIPU_API_KEY}
    timeout_seconds: 60

  longcat:
    base_url: https://api.longcat.chat/openai
    api_key: ${LONGCAT_API_KEY}
    timeout_seconds: 30

defaults:
  retries: 3
  backoff_base_seconds: 1.0
  backoff_max_seconds: 10.0

# 生产模型矩阵（2026-05-26 实测 eval_judge_compare · 详见 docs/free-llm-vendors.md）
#
# | scene              | 模块                 | model                |
# |--------------------|----------------------|----------------------|
# | turtle_soup_judge  | 海龟汤 · 提问判定    | LongCat-Flash-Chat   |
# | turtle_soup_claim  | 海龟汤 · 宣告判定    | LongCat-Flash-Chat   |
# | web_search         | 查资料 · 搜索总结    | LongCat-Flash-Lite   |
# | ask_ai             | 查资料 · LLM 兜底    | LongCat-Flash-Lite   |
# | turtle_soup_host   | 海龟汤 · LLM 出题    | glm-4-flash-250414   |
# | trivia_host        | 趣味问答 · LLM 补题  | glm-4-flash-250414   |
# | default            | 兜底                 | glm-4-flash-250414   |

scenes:
  default:
    provider: zhipu
    model: glm-4-flash-250414
    temperature: 0.7
    max_tokens: 1024

  turtle_soup_host:
    provider: zhipu
    model: glm-4-flash-250414
    temperature: 0.9
    max_tokens: 2048
    json_mode_default: true

  turtle_soup_judge:
    provider: longcat
    model: LongCat-Flash-Chat
    temperature: 0.1
    max_tokens: 256
    json_mode_default: true
    timeout_seconds: 30

  turtle_soup_claim:
    provider: longcat
    model: LongCat-Flash-Chat
    temperature: 0.2
    max_tokens: 512
    json_mode_default: true
    timeout_seconds: 45

  trivia_host:
    provider: zhipu
    model: glm-4-flash-250414
    temperature: 0.9
    max_tokens: 1024
    json_mode_default: true
    timeout_seconds: 30

  ask_ai:
    provider: longcat
    model: LongCat-Flash-Lite
    temperature: 0.7
    max_tokens: 1024
    timeout_seconds: 30

  web_search:
    provider: longcat
    model: LongCat-Flash-Lite
    temperature: 0.3
    max_tokens: 512
    timeout_seconds: 30
